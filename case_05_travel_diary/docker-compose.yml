services:
  db:
    image: postgres:16-alpine
    container_name: synergy_travel_diary_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-travel_diary_db}
      POSTGRES_USER: ${POSTGRES_USER:-travel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-travel_password}
    ports:
      - "5435:5432"
    volumes:
      - travel_diary_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel_user -d travel_diary_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: synergy_travel_diary_web
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://travel_user:travel_password@db:5432/travel_diary_db}
    ports:
      - "8005:8000"
    volumes:
      - ./app:/app/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  travel_diary_postgres_data:
