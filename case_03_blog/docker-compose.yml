services:
  db:
    image: postgres:16-alpine
    container_name: synergy_blog_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blog_db}
      POSTGRES_USER: ${POSTGRES_USER:-blog_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blog_password}
    ports:
      - "5433:5432"
    volumes:
      - blog_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog_user -d blog_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: synergy_blog_web
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://blog_user:blog_password@db:5432/blog_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    ports:
      - "8003:8000"
    volumes:
      - ./app:/app/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  blog_postgres_data:
